<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#172554"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c6ef5"/>
      <stop offset="100%" style="stop-color:#ff922b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg3)"/>
  <!-- Connection lines -->
  <g stroke="#4c6ef5" stroke-width="1" opacity="0.15">
    <line x1="200" y1="150" x2="400" y2="250"/><line x1="400" y1="250" x2="600" y2="200"/>
    <line x1="600" y1="200" x2="800" y2="300"/><line x1="800" y1="300" x2="1000" y2="220"/>
    <line x1="300" y1="400" x2="500" y2="350"/><line x1="500" y1="350" x2="700" y2="420"/>
    <line x1="700" y1="420" x2="900" y2="380"/>
  </g>
  <!-- Nodes -->
  <g>
    <circle cx="200" cy="150" r="30" fill="#1e293b" stroke="#4c6ef5" stroke-width="2"/>
    <text x="200" y="155" text-anchor="middle" fill="#748ffc" font-size="20">⚡</text>
    <circle cx="400" cy="250" r="35" fill="#1e293b" stroke="#4c6ef5" stroke-width="2"/>
    <text x="400" y="255" text-anchor="middle" fill="#748ffc" font-size="22">⚙️</text>
    <circle cx="600" cy="200" r="40" fill="#1e293b" stroke="url(#accent3)" stroke-width="2"/>
    <text x="600" y="205" text-anchor="middle" fill="#fff" font-size="24">🚀</text>
    <circle cx="800" cy="300" r="35" fill="#1e293b" stroke="#ff922b" stroke-width="2"/>
    <text x="800" y="305" text-anchor="middle" fill="#ffa94d" font-size="22">📊</text>
    <circle cx="1000" cy="220" r="30" fill="#1e293b" stroke="#ff922b" stroke-width="2"/>
    <text x="1000" y="225" text-anchor="middle" fill="#ffa94d" font-size="20">🔒</text>
  </g>
  <!-- Dashboard mockup center -->
  <rect x="350" y="320" width="500" height="240" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="370" y="345" width="200" height="80" rx="8" fill="#334155"/>
  <rect x="385" y="360" width="80" height="10" rx="3" fill="#64748b"/>
  <rect x="385" y="380" width="120" height="18" rx="3" fill="url(#accent3)"/>
  <rect x="385" y="405" width="60" height="8" rx="2" fill="#22c55e"/>
  <rect x="590" y="345" width="240" height="80" rx="8" fill="#334155"/>
  <!-- Chart bars -->
  <rect x="610" y="395" width="20" height="20" rx="2" fill="#4c6ef5"/><rect x="638" y="385" width="20" height="30" rx="2" fill="#4c6ef5"/>
  <rect x="666" y="375" width="20" height="40" rx="2" fill="#4c6ef5"/><rect x="694" y="360" width="20" height="55" rx="2" fill="url(#accent3)"/>
  <rect x="722" y="370" width="20" height="45" rx="2" fill="#ff922b"/><rect x="750" y="355" width="20" height="60" rx="2" fill="#ff922b"/>
  <!-- Bottom row -->
  <rect x="370" y="440" width="460" height="100" rx="8" fill="#334155"/>
  <rect x="390" y="460" width="100" height="10" rx="3" fill="#64748b"/>
  <rect x="390" y="480" width="200" height="8" rx="2" fill="#475569"/>
  <rect x="390" y="500" width="150" height="8" rx="2" fill="#475569"/>
  <rect x="390" y="520" width="80" height="8" rx="2" fill="#475569"/>
  <!-- Glow -->
  <circle cx="600" cy="300" r="300" fill="#4c6ef5" opacity="0.03"/>
</svg>
